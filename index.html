<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - FoodSafe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">
    <div class="container py-4">
        
        <header class="dashboard-header text-center">
            <h1 class="fw-bold">FoodSafe</h1>
            <p class="fw-bold">by Miguel Monterola of S16 Team 3</p>
        </header>
        <div class="row g-4">     
            <div class="col-12 col-md-4">
                <div class="card shadow-sm p-3 h-100">
                    <h5 class="card-title text-center">Businesses by District</h5>
                    <p class="text-center small">Registered Restaurants per Area</p>
                    <canvas id="districtChart"></canvas>
                </div>
            </div>

            <div class="col-12 col-md-4">
                <div class="card shadow-sm p-3 h-100">
                    <h5 class="card-title text-center">Public Search Traffic</h5>
                    <p class="text-center small">How many users search per day</p>
                    <canvas id="searchChart"></canvas>
                </div>
            </div>

            <div class="col-12 col-md-4">
                <div class="card shadow-sm p-3 h-100">
                    <h5 class="card-title text-center">Report Anonymity</h5>
                    <p class="text-center small">Anonymous vs. Public Reports</p>
                    <canvas id="anonChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
